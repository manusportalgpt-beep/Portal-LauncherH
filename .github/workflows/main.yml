name: Build Windows x64 (.exe)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Portal-Launcher/src-tauri

      - name: Install frontend dependencies
        working-directory: Portal-Launcher
        run: pnpm install

      - name: Build Tauri app (Windows x64)
        working-directory: Portal-Launcher
        run: pnpm tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload installer (.exe NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: portal-launcher-windows-x64-exe
          path: Portal-Launcher/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: portal-launcher-windows-x64-msi
          path: Portal-Launcher/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn
